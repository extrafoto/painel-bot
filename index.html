<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Tabela</title>
</head>
<body>
  <h1>Teste</h1>
  <div id="status">Carregando...</div>
  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Número</th>
        <th>Cidade</th>
        <th>Mensagem</th>
        <th>Modo</th>
        <th>Interactions</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const URL = "COLE_AQUI_A_URL_DO_WEBHOOK_JSON";

    async function carregar() {
      const status = document.getElementById("status");
      const tbody = document.getElementById("tbody");

      try {
        const res = await fetch(URL);
        const dados = await res.json();

        console.log("RESPOSTA:", dados);

        tbody.innerHTML = "";

        if (!Array.isArray(dados)) {
          status.textContent = "Resposta não é array";
          return;
        }

        status.textContent = "Total de registros: " + dados.length;

        dados.forEach(item => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id ?? ""}</td>
            <td>${item.nome ?? ""}</td>
            <td>${item.numero ?? ""}</td>
            <td>${item.cidade ?? ""}</td>
            <td>${item.mensagem ?? ""}</td>
            <td>${item.modo ?? ""}</td>
            <td>${item.interactions ?? ""}</td>
            <td>${item.timestamp_ultima ?? ""}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        console.error(e);
        status.textContent = "Erro: " + e.message;
      }
    }

    carregar();
  </script>
</body>
</html>
